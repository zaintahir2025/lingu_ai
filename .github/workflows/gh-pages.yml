name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Trigger on push to main branch

# Add explicit write permissions so the GITHUB_TOKEN can push to gh-pages branch
permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        # The base-href must match your repository name EXACTLY (with leading and trailing slashes).
        # We pass the production backend URL using dart-define. Wrapped in quotes to prevent bash errors if the secret is empty.
        run: flutter build web --release --base-href /lingu_ai/ --dart-define=API_URL="${{ secrets.API_URL }}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
